<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Budgie"/>
  <meta name="theme-color" content="#0a0a0f"/>
  <meta name="description" content="Personal budget tracker using the 50-30-20 method"/>

  <title>Budgie</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      height: 100%;
      background: #0a0a0f;
      color: #f0f0f5;
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      overscroll-behavior: none;
    }
    /* Safe area insets for notched phones */
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    /* Desktop — center with sidebar feel */
    @media (min-width: 520px) {
      body { background: #050508; }
      #root { 
        display: flex;
        justify-content: center;
      }
    }
    /* Prevent text size adjustment on rotation */
    * { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    /* Loading screen */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    #loading p {
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      font-weight: 600;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #loading svg { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root">
    <!-- Loading screen shown before React mounts -->
    <div id="loading">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="g1" x1="10" y1="10" x2="54" y2="54" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#4ade9e"/>
            <stop offset="100%" stop-color="#0fbcf9"/>
          </linearGradient>
        </defs>
        <ellipse cx="34" cy="40" rx="18" ry="20" fill="url(#g1)"/>
        <ellipse cx="35" cy="46" rx="10" ry="12" fill="#fffbe6" opacity="0.9"/>
        <ellipse cx="20" cy="38" rx="10" ry="16" fill="#22d4a0" transform="rotate(-15 20 38)"/>
        <circle cx="38" cy="18" r="13" fill="url(#g1)"/>
        <circle cx="44" cy="22" r="4" fill="#f97316" opacity="0.8"/>
        <circle cx="40" cy="15" r="4" fill="#fff"/>
        <circle cx="41" cy="15" r="2.2" fill="#1e293b"/>
        <circle cx="42" cy="14" r="0.8" fill="#fff"/>
        <path d="M33 20 L28 23 L33 25 Z" fill="#f5a623"/>
        <circle cx="54" cy="12" r="7" fill="#f5a623" opacity="0.95"/>
        <text x="54" y="16" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">$</text>
      </svg>
      <p>Loading Budgie...</p>
    </div>
  </div>

  <!-- React + ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel standalone to transpile JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- The app (loaded as JSX, transpiled by Babel) -->
  <script type="text/babel" src="app.js" data-type="module"></script>

  <!-- Register service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
